      <#94A3B8>酮化灌木的种子，可用于培育酮化灌木</#94A3B8>
      <#64748B>大部分学者认为，酮化灌木中之所以能提取到硝化物，是因为它吸收了过量含有侵蚀物质的雨水</#64748B>
