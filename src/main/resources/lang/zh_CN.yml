research:
  plants_basic: <#87dd87>基础植物培育
  materials_basic: <#a8a8a8>基础材料加工
  components_basic: <#5555ff>基础组件制造
  machines_basic: <#5555ff>基础工业设备
  medicines_basic: <#ff5555>基础药品制造
  products_basic: <#aa00aa>基础产品封装
item:
  high_crystal_part:
    name: <white><b>高晶零件</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>高晶纤维经加工后成型的零件，可用于其他材料合成或设备制造</#94A3B8>
      <#64748B>具备一定通用性的高品零件</#64748B>
  steel_part:
    name: <white><b>钢制零件</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>钢块经加工后成型的零件，可用于其他材料合成或设备制造</#94A3B8>
      <#64748B>具备一定通用性的钢制零件</#64748B>
  stable_carbon_block:
    name: <white><b>稳定碳块</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>致密碳粉末精炼融合后的高级材料</#94A3B8>
      <#64748B>多级加工后，碳块在碳元素状态上获得了微妙且稳定的平衡</#64748B>
  sand_leaf_powder:
    name: <white><b>砂叶粉末</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>砂叶粉末，可用于其他材料合成</#94A3B8>
      <#64748B>在经过粉碎处理后，砂叶中粗砺的部分得到了充分利用</#64748B>
  dense_originium_powder:
    name: <white><b>致密源石粉末</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>源矿粉末研磨后的细粉，状态稳定</#94A3B8>
      <#64748B>工团在源石培植项目初期尝试过"粉末培植法"</#64748B>
  dense_crystal_powder:
    name: <white><b>致密晶体粉末</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>晶体外壳粉末研磨后的细粉</#94A3B8>
      <#64748B>经过精细研磨后，致密晶体粉末中的颗粒将通透细腻至几乎不可见</#64748B>
  high_crystal_powder:
    name: <white><b>高晶粉末</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>紫晶粉末研磨后的细粉</#94A3B8>
      <#64748B>经过精细研磨后，未妥善保存的高精粉末会在非密封容器中"流动"</#64748B>
  dense_blue_iron_powder:
    name: <white><b>致密蓝铁粉末</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>蓝铁粉末研磨后的细粉</#94A3B8>
      <#64748B>经过精细研磨后，致密蓝铁粉末广受绘画爱好者欢迎</#64748B>
  dense_carbon_powder:
    name: <white><b>致密碳粉末</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>碳粉末研磨后的细粉</#94A3B8>
      <#64748B>经过精细研磨后，碳粉已拥有了独特的细腻质地</#64748B>
  high_cap_valley_battery:
    name: <white><b>高容谷地电池</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#A78BFA>紫色品质</#A78BFA>
      <#94A3B8>通过设备封装获得的电池</#94A3B8>
      <#64748B>回收废弃电池是许多荒地居民的主业</#64748B>
  large_bud_spray:
    name: <white><b>大瓶芽针喷剂</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#A78BFA>紫色品质</#A78BFA>
      <#94A3B8>使用后可以回复干员生命值的战术物品</#94A3B8>
      <#64748B>简单灌瓶制成的喷剂。必要时可内服</#64748B>
  high_crystal_bottle:
    name: <white><b>高晶质瓶</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>由高晶纤维加工后得来的金属瓶</#94A3B8>
      <#64748B>部分特殊化学试剂仅能以高品质瓶储存</#64748B>
  steel_bottle:
    name: <white><b>钢质瓶</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>由钢块加工后得来的金属瓶</#94A3B8>
      <#64748B>市面上最为常见的钢瓶</#64748B>
  fine_ground_buckwheat_powder:
    name: <white><b>细磨荞花粉末</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>荞花粉末研磨后的细粉</#94A3B8>
      <#64748B>经过精细研磨后，荞花提取物表现出了"异常"活性</#64748B>
  fine_ground_citrus_powder:
    name: <white><b>细磨柑实粉末</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>柑实粉末研磨后的细粉</#94A3B8>
      <#64748B>经过精细研磨后，细磨柑实粉末的味道极度苦涩</#64748B>
  steel_block:
    name: <white><b>钢块</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>致密蓝铁粉末精炼融合后的高级材料</#94A3B8>
      <#64748B>终末地工业生产的钢材已被列为《塔卫二工业金属侵蚀耐受标准》二级标准参考物</#64748B>
  high_crystal_fiber:
    name: <white><b>高晶纤维</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>高晶粉末精炼融合后的高级材料</#94A3B8>
      <#64748B>多级加工后，高晶纤维已经能够应用于多种信号传输场景</#64748B>
  dense_crystal:
    name: <white><b>密制晶体</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>致密晶体粉末精炼融合后的高级材料</#94A3B8>
      <#64748B>多级加工后，密制晶体足以被称为"宝石"</#64748B>
  buckwheat:
    name: <white><b>荞花</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#94A3B8>灰色品质</#94A3B8>
      <#94A3B8>可在野外采集或在工厂培育出的艳丽花朵，粉碎后可用于药品或其他材料合成</#94A3B8>
      <#64748B>战争初期，一支宏山侦查队首先发现了这种色彩艳丽的植物，并在紧急状况下将其作为止血药物使用</#64748B>
  buckwheat_seed:
    name: <white><b>荞花种子</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#94A3B8>灰色品质</#94A3B8>
      <#94A3B8>荞花的种子，可用于种植新的荞花</#94A3B8>
      <#64748B>放置荞花田块并进行育苗和浇水，等待其成熟时收获可以获取荞花</#64748B>
  seed_extractor:
    name: <white><b>采种机</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>能够采集普通植物种子的设备模块</#94A3B8>
      <#64748B>需放置在有效结构上方可运行</#64748B>
  planter:
    name: <white><b>种植机</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>能够培育各类普通植物的仓形设备模块</#94A3B8>
      <#64748B>终末地工业自研，实时监控内部光照与温度</#64748B>
  relay_base:
    name: <white><b>中继器基座</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>电力传输网络的基础组件</#94A3B8>
      <#64748B>远距离传导能量的关键节点</#64748B>
  relay_diffuser:
    name: <white><b>中继器信号扩散器</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>用于扩大信号覆盖范围的扩散装置</#94A3B8>
      <#64748B>确保能量场稳定覆盖目标区域</#64748B>
  power_station_base:
    name: <white><b>供电庄基座</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>供电庄结构的核心支撑组件</#94A3B8>
      <#64748B>承载高压能量输出的基础平台</#64748B>
  power_station_emitter:
    name: <white><b>供电庄辐射装置</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>负责能量辐射与分配的核心装置</#94A3B8>
      <#64748B>需配合基座完成完整供电网络</#64748B>
  protocol_core_controller:
    name: <white><b>协议核心控制器</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>电网的核心设备，提供 200 点电力容量</#94A3B8>
      <#64748B>5x5 铁块底座 + 信标构建</#64748B>
  light_dim_stone:
    name: <white><b>轻黯石</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#A78BFA>紫色品质</#A78BFA>
      <#94A3B8>采集自野外或培养舱培养的特殊矿物</#94A3B8>
      <#64748B>黯石又被称为"古老之石"，它象征着一段人类从未见证过的消亡</#64748B>
  cartilage_fragment:
    name: <white><b>软骨碎屑</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>绿色品质</#22C55E>
      <#94A3B8>击败碾骨焰术师的掉落物，可用于精制食药制作</#94A3B8>
      <#64748B>被碾碎的野兽软骨，是碾骨焰术师投入巢雕中的"燃料"</#64748B>
  carbon_block:
    name: <white><b>碳块</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>绿色品质</#22C55E>
      <#94A3B8>植物烧制的碳材料，可用于其他材料合成</#94A3B8>
      <#64748B>终末地工业在战争时期就已完成了对制碳过程中废气处理的相关技术的优化</#64748B>
  amethyst_fiber:
    name: <white><b>紫晶纤维</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>绿色品质</#22C55E>
      <#94A3B8>由紫晶矿精炼得来的纤维，可用于其他材料合成</#94A3B8>
      <#64748B>将紫晶加工成纤维后，其拉伸度获得了极大的增强</#64748B>
  blue_iron_block:
    name: <white><b>蓝铁块</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>绿色品质</#22C55E>
      <#94A3B8>由蓝铁矿石精炼得来的金属块，可用于其他材料合成</#94A3B8>
      <#64748B>协议源石的衍生物，在极严苛的环境中才能够合成</#64748B>
  carbon_powder:
    name: <white><b>碳粉末</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>绿色品质</#22C55E>
      <#94A3B8>碳材料的粉末，可用于其他材料合成</#94A3B8>
      <#64748B>在经过粉碎处理后，碳拥有了更细腻的质地</#64748B>
  industrial_explosive:
    name: <white><b>工业爆炸物</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>蓝色品质</#60A5FA>
      <#94A3B8>组装出的爆炸物，可直接使用进行攻击</#94A3B8>
      <#64748B>该物品爆炸风险较高，请谨慎携带及使用</#64748B>
  gray_wheat_seed:
    name: <white><b>灰芦麦种子</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>绿色品质</#22C55E>
      <#94A3B8>野生灰芦麦的种子，通过调制成田块并进行精细化培育，可产出灰芦麦</#94A3B8>
      <#64748B>经严格筛选的灰芦麦，其种子饱满完整，活力较高</#64748B>
  gray_wheat:
    name: <white><b>灰芦麦</b>
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>绿色品质</#22C55E>
      <#94A3B8>通过精细种植才能培育的作物，可直接用于珍贵食药的制作</#94A3B8>
      <#64748B>灰芦麦易于种植，产量较足，是开拓区民众的主粮</#64748B>
  ketone_tree_seed:
    name: <white><b>酮化树种</b>
    lore: |-
