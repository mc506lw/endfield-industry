item:
  high_crystal_part:
    name: "<white><b>High Crystal Part</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>High crystal fiber processed into parts, usable for other material synthesis or equipment manufacturing</#94A3B8>
      <#64748B>Versatile high-quality parts</#64748B>
  steel_part:
    name: "<white><b>Steel Part</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Steel blocks processed into parts, usable for other material synthesis or equipment manufacturing</#94A3B8>
      <#64748B>Versatile steel parts</#64748B>
  stable_carbon_block:
    name: "<white><b>Stable Carbon Block</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Advanced material from refined dense carbon powder</#94A3B8>
      <#64748B>After multi-stage processing, carbon blocks achieve a subtle and stable balance in elemental state</#64748B>
  sand_leaf_powder:
    name: "<white><b>Sand Leaf Powder</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Sand leaf powder, usable for other material synthesis</#94A3B8>
      <#64748B>After crushing, the coarse parts of sand leaves are fully utilized</#64748B>
  dense_originium_powder:
    name: "<white><b>Dense Originium Powder</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Originium ore powder after grinding, stable state</#94A3B8>
      <#64748B>The guild attempted "powder cultivation method" during the early stages of the originium cultivation project</#64748B>
  dense_crystal_powder:
    name: "<white><b>Dense Crystal Powder</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Crystal shell powder after grinding</#94A3B8>
      <#64748B>After fine grinding, the particles in dense crystal powder become almost invisible</#64748B>
  high_crystal_powder:
    name: "<white><b>High Crystal Powder</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Amethyst powder after grinding</#94A3B8>
      <#64748B>After fine grinding, improperly stored high-quality powder will "flow" in non-sealed containers</#64748B>
  dense_blue_iron_powder:
    name: "<white><b>Dense Blue Iron Powder</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Blue iron powder after grinding</#94A3B8>
      <#64748B>After fine grinding, dense blue iron powder is popular among painting enthusiasts</#64748B>
  dense_carbon_powder:
    name: "<white><b>Dense Carbon Powder</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Carbon powder after grinding</#94A3B8>
      <#64748B>After crushing, carbon powder has acquired a unique delicate texture</#64748B>
  high_cap_valley_battery:
    name: "<white><b>High-Capacity Valley Battery</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#A78BFA>Purple Quality</#A78BFA>
      <#94A3B8>Battery obtained through equipment packaging</#94A3B8>
      <#64748B>Recycling used batteries is the main livelihood for many wasteland residents</#64748B>
  large_bud_spray:
    name: "<white><b>Large Bud Spray</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#A78BFA>Purple Quality</#A78BFA>
      <#94A3B8>Tactical item that can restore operator health when used</#94A3B8>
      <#64748B>Simple bottled spray. Can be taken orally if necessary</#64748B>
  high_crystal_bottle:
    name: "<white><b>High Crystal Bottle</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Metal bottle processed from high crystal fiber</#94A3B8>
      <#64748B>Some special chemical reagents can only be stored in high-quality bottles</#64748B>
  steel_bottle:
    name: "<white><b>Steel Bottle</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Metal bottle processed from steel blocks</#94A3B8>
      <#64748B>The most common steel bottle on the market</#64748B>
  fine_ground_buckwheat_powder:
    name: "<white><b>Fine Ground Buckwheat Powder</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Buckwheat powder after grinding</#94A3B8>
      <#64748B>After fine grinding, buckwheat extract shows "abnormal" activity</#64748B>
  fine_ground_citrus_powder:
    name: "<white><b>Fine Ground Citrus Powder</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Citrus powder after grinding</#94A3B8>
      <#64748B>After fine grinding, fine ground citrus powder tastes extremely bitter</#64748B>
  steel_block:
    name: "<white><b>Steel Block</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Advanced material from refined dense blue iron powder</#94A3B8>
      <#64748B>Steel produced by Endfield Industry has been listed as a Class 2 reference standard in the "Terra II Industrial Metal Erosion Tolerance Standard"</#64748B>
  high_crystal_fiber:
    name: "<white><b>High Crystal Fiber</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Advanced material from refined high crystal powder</#94A3B8>
      <#64748B>After multi-stage processing, high crystal fiber can be applied to various signal transmission scenarios</#64748B>
  dense_crystal:
    name: "<white><b>Dense Crystal</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Advanced material from refined dense crystal powder</#94A3B8>
      <#64748B>After multi-stage processing, dense crystal is sufficient to be called a "gemstone"</#64748B>
  buckwheat:
    name: "<white><b>Buckwheat</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#94A3B8>Gray Quality</#94A3B8>
      <#94A3B8>Vibrant flowers that can be collected in the wild or cultivated in factories, usable for medicine or other material synthesis</#94A3B8>
      <#64748B>During the early war, a Hongshan reconnaissance team first discovered this vibrantly colored plant and used it as an emergency hemostatic agent</#64748B>
  buckwheat_seed:
    name: "<white><b>Buckwheat Seed</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#94A3B8>Gray Quality</#94A3B8>
      <#94A3B8>Seeds of buckwheat, usable for cultivating new buckwheat</#94A3B8>
      <#64748B>Place buckwheat field blocks for seedling and watering, harvest to obtain buckwheat when mature</#64748B>
  seed_extractor:
    name: "<white><b>Seed Extractor</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Equipment module capable of collecting seeds from ordinary plants</#94A3B8>
      <#64748B>Must be placed above a valid structure to operate</#64748B>
  planter:
    name: "<white><b>Planter</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Warehouse-shaped equipment module capable of cultivating various ordinary plants</#94A3B8>
      <#64748B>Self-developed by Endfield Industry, real-time monitoring of internal lighting, temperature, and plant hormone status</#64748B>
  relay_base:
    name: "<white><b>Relay Base</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Basic component of power transmission network</#94A3B8>
      <#64748B>Key node for long-distance energy transmission</#64748B>
  relay_diffuser:
    name: "<white><b>Relay Signal Diffuser</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Diffusion device used to expand signal coverage</#94A3B8>
      <#64748B>Ensures stable energy field coverage of target area</#64748B>
  power_station_base:
    name: "<white><b>Power Station Base</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Core support component of power station structure</#94A3B8>
      <#64748B>Foundation platform bearing high-voltage energy output</#64748B>
  power_station_emitter:
    name: "<white><b>Power Station Emitter</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Core device responsible for energy radiation and distribution</#94A3B8>
      <#64748B>Must be paired with base to complete power network</#64748B>
  protocol_core_controller:
    name: "<white><b>Protocol Core Controller</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Core equipment of the power grid, providing 200 power capacity</#94A3B8>
      <#64748B>5x5 iron block base + beacon construction</#64748B>
  light_dim_stone:
    name: "<white><b>Light Dim Stone</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#A78BFA>Purple Quality</#A78BFA>
      <#94A3B8>Special mineral collected in the wild or cultivated in incubators</#94A3B8>
      <#64748B>Dim stones are also known as "Ancient Stones", symbolizing a disappearance humans never witnessed</#64748B>
  cartilage_fragment:
    name: "<white><b>Cartilage Fragment</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>Green Quality</#22C55E>
      <#94A3B8>Drops from defeating Bone-Flame Shamans, usable for refined food/medicine production</#94A3B8>
      <#64748B>Crushed beast cartilage, fuel thrown by Bone-Flame Shamans into the Nest Sculpture</#64748B>
  carbon_block:
    name: "<white><b>Carbon Block</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>Green Quality</#22C55E>
      <#94A3B8>Carbon material from plant burning, usable for other material synthesis</#94A3B8>
      <#64748B>Endfield Industry completed optimization of exhaust gas treatment during the carbon production process as early as the war period</#64748B>
  amethyst_fiber:
    name: "<white><b>Amethyst Fiber</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>Green Quality</#22C55E>
      <#94A3B8>Fiber refined from amethyst ore, usable for other material synthesis</#94A3B8>
      <#64748B>After processing amethyst into fiber, its stretchability is greatly enhanced</#64748B>
  blue_iron_block:
    name: "<white><b>Blue Iron Block</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>Green Quality</#22C55E>
      <#94A3B8>Metal blocks refined from blue iron ore, usable for other material synthesis</#94A3B8>
      <#64748B>Derivative of Protocol Originium, can only be synthesized in extremely harsh environments</#64748B>
  carbon_powder:
    name: "<white><b>Carbon Powder</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>Green Quality</#22C55E>
      <#94A3B8>Carbon material powder, usable for other material synthesis</#94A3B8>
      <#64748B>After crushing, carbon has acquired a more delicate texture</#64748B>
  industrial_explosive:
    name: "<white><b>Industrial Explosive</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#60A5FA>Blue Quality</#60A5FA>
      <#94A3B8>Assembled explosive, can be used directly for attacks</#94A3B8>
      <#64748B>This item has a high explosion risk, please carry and use with caution</#64748B>
  gray_wheat_seed:
    name: "<white><b>Gray Wheat Seed</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>Green Quality</#22C55E>
      <#94A3B8>Seeds of wild gray wheat, can produce gray wheat through field modulation and refined cultivation</#94A3B8>
      <#64748B>Strictly screened gray wheat, seeds are full and intact, with high vitality</#64748B>
  gray_wheat:
    name: "<white><b>Gray Wheat</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>Green Quality</#22C55E>
      <#94A3B8>Crops that can only be cultivated through fine planting, usable directly for precious food/medicine production</#94A3B8>
      <#64748B>Gray wheat is easy to plant and has sufficient yield, making it the staple food for residents in the development zone</#64748B>
  ketone_tree_seed:
    name: "<white><b>Ketone Tree Seed</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#94A3B8>Gray Quality</#94A3B8>
      <#94A3B8>Seeds of ketone shrubs, usable for cultivating ketone shrubs</#94A3B8>
      <#64748B>Most scholars believe that the reason ketone shrubs can extract nitrates is because they absorb excessive amounts of erosion-containing rainwater</#64748B>
  citrus_seed:
    name: "<white><b>Citrus Seed</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#94A3B8>Gray Quality</#94A3B8>
      <#94A3B8>Seeds of citrus, usable for cultivating citrus</#94A3B8>
      <#64748B>Plant enthusiasts in the Civilization Circle once voted for "Most Common Plants in the Wilderness", with buckwheat and citrus ranking in the top ten</#64748B>
  blue_iron_ore:
    name: "<white><b>Blue Iron Ore</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#94A3B8>Gray Quality</#94A3B8>
      <#94A3B8>A naturally occurring blue alloy that can be processed in industrial systems</#94A3B8>
      <#64748B>The formation of blue iron is debated, but in the era before industrial metals appeared, it was the metal people relied on most</#64748B>
  glow_shell_bug:
    name: "<white><b>Glow Shell Bug</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>Green Quality</#22C55E>
      <#94A3B8>Terra II creature affected by originium, extremely small but capable of emitting light</#94A3B8>
      <#64748B>A tiny flying glow shell originium bug, usable for other material synthesis</#64748B>
  amethyst_powder:
    name: "<white><b>Amethyst Powder</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>Green Quality</#22C55E>
      <#94A3B8>Amethyst fiber powder after crushing, usable for other material synthesis</#94A3B8>
      <#64748B>After crushing, the texture of amethyst secondary processed products becomes more uniform</#64748B>
  grass_seed_powder:
    name: "<white><b>Grass Seed Powder</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#94A3B8>Gray Quality</#94A3B8>
      <#94A3B8>Drops from defeating Bone-Plunderers, Bone-Shooters, and Bone-Infiltrators, usable for refined food/medicine production</#94A3B8>
      <#64748B>Canned powder mixed with several grass seed shells, has certain toxicity</#64748B>
  valley_dispatch_ticket:
    name: "<white><b>Valley Dispatch Ticket</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#FBBF24>Gold Quality</#FBBF24>
      <#94A3B8>Dispatch ticket issued for Valley No. 4, only usable in this location, with various rich uses</#94A3B8>
      <#64748B>According to the relevant provisions of the "Circle Convention", contracting parties shall guarantee the normal circulation of gold tickets in the people's livelihood economy</#64748B>
  crystal_shell:
    name: "<white><b>Crystal Shell</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>Green Quality</#22C55E>
      <#94A3B8>Outer shell portion separated during originium processing, usable for other material synthesis</#94A3B8>
      <#64748B>The thickness of originium crystal shell is usually an important basis for judging the duration of an ore vein</#64748B>
  beast_meat:
    name: "<white><b>Beast Meat</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#94A3B8>Gray Quality</#94A3B8>
      <#94A3B8>Drops from defeating wild toothed beasts and Bone-Shredders, usable for refined food/medicine production</#94A3B8>
      <#64748B>Fresh beast meat, sufficiently fresh</#64748B>
  high_energy_fragrant_stone:
    name: "<white><b>High Energy Fragrant Stone</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#94A3B8>Gray Quality</#94A3B8>
      <#94A3B8>Drops from defeating Thorn-Angels and Heavy-Angels, usable for refined food/medicine production</#94A3B8>
      <#64748B>Occasionally collected from the "Energy Spike" part of angels, possessing a wonderful fragrance</#64748B>
  hard_fragrant_stone:
    name: "<white><b>Hard Fragrant Stone</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#94A3B8>Gray Quality</#94A3B8>
      <#94A3B8>Drops from defeating Big-Horn Angels and Hard-Horn Angels, usable for refined food/medicine production</#94A3B8>
      <#64748B>Occasionally collected from the "Horn" part of angels, possessing a wonderful fragrance</#64748B>
  crystal_shell_powder:
    name: "<white><b>Crystal Shell Powder</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#22C55E>Green Quality</#22C55E>
      <#94A3B8>Crystal shell powder, usable for other material synthesis</#94A3B8>
      <#64748B>After crushing, the texture of crystal shell secondary processed products becomes more uniform</#64748B>
  light_red_pillar_fungus:
    name: "<white><b>Light Red Pillar Fungus</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#A78BFA>Purple Quality</#A78BFA>
      <#94A3B8>Special fungus collected in the wild or cultivated in incubators</#94A3B8>
      <#64748B>When red pillar fungus grows to a certain stage and color reaches a certain depth, it becomes extremely toxic</#64748B>
  crystalized_toothed_leaf:
    name: "<white><b>Crystallized Toothed Leaf</b>"
    lore: |-
      <#F59E0B>◈</#F59E0B> <#A78BFA>Purple Quality</#A78BFA>
      <#94A3B8>Special plant collected in the wild or cultivated in incubators</#94A3B8>
